<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Timer — AI Stuff for Parents</title>
<meta name="theme-color" content="#1e1005">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timer">
<style>
/* ── Tokens ───────────────────────────────────────────────── */
:root {
  --bg:      #0e0905;
  --fg:      #f0e2c0;
  --muted:   #8a6e47;
  --faint:   #3d2e18;
  --surface: #181008;
  --border:  #2a1e0e;
  --accent:  #c8922a;
  --ring-empty: #2a1e0e;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:      #f4e9d4;
    --fg:      #1c1208;
    --muted:   #7a5e38;
    --faint:   #c4b090;
    --surface: #ede0c2;
    --border:  #d8c9a8;
    --accent:  #b87820;
    --ring-empty: #d8c9a8;
  }
}
:root[data-theme="light"] {
  --bg:#f4e9d4; --fg:#1c1208; --muted:#7a5e38; --faint:#c4b090;
  --surface:#ede0c2; --border:#d8c9a8; --accent:#b87820;
  --ring-empty:#d8c9a8;
}
:root[data-theme="dark"] {
  --bg:#0e0905; --fg:#f0e2c0; --muted:#8a6e47; --faint:#3d2e18;
  --surface:#181008; --border:#2a1e0e; --accent:#c8922a;
  --ring-empty:#2a1e0e;
}

/* ── Reset ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  transition: background 0.25s, color 0.25s;
  overscroll-behavior: none;
}

/* ── Top bar ──────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  flex-shrink: 0;
}
.back-link {
  font-family: system-ui, sans-serif;
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.15s;
}
.back-link:hover { color: var(--fg); }
.theme-btn {
  width: 2.1rem; height: 2.1rem;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  transition: border-color 0.15s, color 0.15s;
}
.theme-btn:hover { color: var(--fg); border-color: var(--muted); }

/* ── Main ─────────────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.5rem 1.5rem max(2rem, env(safe-area-inset-bottom));
  gap: 1.75rem;
}

/* ── Timer face ───────────────────────────────────────────── */
.timer-wrap {
  position: relative;
  width: min(72vw, 300px);
  height: min(72vw, 300px);
  flex-shrink: 0;
}

.timer-face {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: conic-gradient(
    from -90deg,
    var(--accent) 0deg var(--fill, 360deg),
    var(--ring-empty) 0deg
  );
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 48px rgba(200,146,42,0.12);
  transition: box-shadow 0.5s;
}

.timer-face.pulse {
  animation: facePulse 1s ease-in-out infinite;
}
@keyframes facePulse {
  0%, 100% { box-shadow: 0 0 48px rgba(200,146,42,0.12); }
  50%       { box-shadow: 0 0 72px rgba(200,146,42,0.38); }
}

.timer-inner {
  width: 72%; height: 72%;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  transition: background 0.25s;
}

.time-display {
  font-style: italic;
  font-size: clamp(2.8rem, 14vw, 4.2rem);
  line-height: 1;
  color: var(--fg);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.timer-label {
  font-family: system-ui, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  padding: 0 0.5rem;
}

/* Complete overlay */
.complete-overlay {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  pointer-events: none;
}
.complete-overlay.visible { display: flex; }
.complete-check {
  font-size: clamp(2rem, 10vw, 3rem);
  line-height: 1;
  color: var(--accent);
  font-style: italic;
}
.complete-word {
  font-family: system-ui, sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
}

/* ── Controls ─────────────────────────────────────────────── */
.controls {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  justify-content: center;
}
.btn {
  font-family: system-ui, sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.03em;
  cursor: pointer;
  border-radius: 2rem;
  padding: 0.7rem 1.75rem;
  border: none;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn:active { transform: scale(0.96); }
.btn-primary  { background: var(--accent); color: #fff; }
.btn-secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn[hidden] { display: none; }

/* ── Presets ──────────────────────────────────────────────── */
.presets {
  width: 100%;
  max-width: 380px;
}
.presets-label {
  font-family: system-ui, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--faint);
  text-align: center;
  margin-bottom: 0.85rem;
}
.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.45rem;
}
.preset-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.85rem;
  padding: 0.65rem 0.8rem;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
  color: inherit;
  font-family: inherit;
}
.preset-btn:hover, .preset-btn:focus-visible {
  border-color: var(--accent);
  outline: none;
}
.preset-btn.selected {
  border-color: var(--accent);
  background: var(--faint);
}
.preset-emoji { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
.preset-name {
  font-family: system-ui, sans-serif;
  font-size: 0.78rem;
  color: var(--fg);
  display: block;
  line-height: 1.2;
}
.preset-dur {
  font-family: system-ui, sans-serif;
  font-size: 0.65rem;
  color: var(--muted);
  display: block;
}

/* Custom row */
.custom-row {
  grid-column: 1 / -1;
  display: flex;
  gap: 0.45rem;
}
.custom-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0.85rem;
  padding: 0.65rem 0.85rem;
  font-family: system-ui, sans-serif;
  font-size: 0.78rem;
  color: var(--fg);
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.custom-input::placeholder { color: var(--muted); }
.custom-input:focus { border-color: var(--accent); }
.custom-set {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 0.85rem;
  padding: 0.65rem 1rem;
  font-family: system-ui, sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.custom-set:hover { opacity: 0.85; }

/* ── Footer ───────────────────────────────────────────────── */
footer {
  padding: 0.85rem 1.25rem max(0.85rem, env(safe-area-inset-bottom));
  text-align: center;
  font-family: system-ui, sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  color: var(--faint);
  flex-shrink: 0;
}
footer a { color: inherit; text-decoration: none; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="https://lullaby.aistuffforparents.com" class="back-link">← Lullaby</a>
  <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">☽</button>
</div>

<main>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer-face" id="timer-face">
      <div class="timer-inner">
        <div class="time-display" id="time-display">5:00</div>
        <div class="timer-label" id="timer-label">Tidy up</div>
      </div>
    </div>
    <div class="complete-overlay" id="complete-overlay">
      <span class="complete-check">✓</span>
      <span class="complete-word">Done!</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary"   id="start-btn">Start</button>
    <button class="btn btn-secondary" id="reset-btn" hidden>Reset</button>
  </div>

  <!-- Presets (shown when idle) -->
  <div class="presets" id="presets">
    <p class="presets-label">Choose an activity</p>
    <div class="preset-grid">

      <button class="preset-btn" data-mins="1" data-name="Wash hands">
        <span class="preset-emoji">🚿</span>
        <span><span class="preset-name">Wash hands</span><span class="preset-dur">1 min</span></span>
      </button>

      <button class="preset-btn selected" data-mins="5" data-name="Tidy up">
        <span class="preset-emoji">🧹</span>
        <span><span class="preset-name">Tidy up</span><span class="preset-dur">5 min</span></span>
      </button>

      <button class="preset-btn" data-mins="2" data-name="Brush teeth">
        <span class="preset-emoji">🦷</span>
        <span><span class="preset-name">Brush teeth</span><span class="preset-dur">2 min</span></span>
      </button>

      <button class="preset-btn" data-mins="10" data-name="Bath time">
        <span class="preset-emoji">🛁</span>
        <span><span class="preset-name">Bath time</span><span class="preset-dur">10 min</span></span>
      </button>

      <button class="preset-btn" data-mins="10" data-name="Wind down">
        <span class="preset-emoji">🌙</span>
        <span><span class="preset-name">Wind down</span><span class="preset-dur">10 min</span></span>
      </button>

      <button class="preset-btn" data-mins="20" data-name="Screen time">
        <span class="preset-emoji">📺</span>
        <span><span class="preset-name">Screen time</span><span class="preset-dur">20 min</span></span>
      </button>

      <button class="preset-btn" data-mins="25" data-name="Homework">
        <span class="preset-emoji">✏️</span>
        <span><span class="preset-name">Homework</span><span class="preset-dur">25 min</span></span>
      </button>

      <div class="custom-row">
        <input class="custom-input" id="custom-input"
          type="number" min="1" max="120"
          placeholder="Custom (minutes)" inputmode="numeric">
        <button class="custom-set" id="custom-set">Set</button>
      </div>

    </div>
  </div>

</main>

<footer>
  <a href="https://www.aistuffforparents.com">AI Stuff for Parents</a>
</footer>

<script>
// ── State ──────────────────────────────────────────────────
let totalMs     = 5 * 60 * 1000;
let remainingMs = totalMs;
let startAt     = null;  // performance.now() when running started
let rafId       = null;
let state       = 'idle';  // idle | running | paused | complete
let activityName = 'Tidy up';
let wakeLock    = null;

// ── DOM ───────────────────────────────────────────────────
const face        = document.getElementById('timer-face');
const timeEl      = document.getElementById('time-display');
const labelEl     = document.getElementById('timer-label');
const startBtn    = document.getElementById('start-btn');
const resetBtn    = document.getElementById('reset-btn');
const presetsEl   = document.getElementById('presets');
const overlayEl   = document.getElementById('complete-overlay');
const customInput = document.getElementById('custom-input');
const customSet   = document.getElementById('custom-set');

// ── Render ────────────────────────────────────────────────
function setFill(fraction) {
  face.style.setProperty('--fill', (Math.max(0, Math.min(1, fraction)) * 360) + 'deg');
}

function fmtTime(ms) {
  const s   = Math.max(0, Math.ceil(ms / 1000));
  const min = Math.floor(s / 60);
  const sec = s % 60;
  return min + ':' + String(sec).padStart(2, '0');
}

function render(ms) {
  timeEl.textContent = fmtTime(ms);
  setFill(ms / totalMs);
}

// ── Tick ─────────────────────────────────────────────────
function tick(now) {
  if (state !== 'running') return;
  const left = remainingMs - (now - startAt);
  if (left <= 0) {
    render(0);
    finish();
    return;
  }
  render(left);
  if (left <= 10000 && !face.classList.contains('pulse')) face.classList.add('pulse');
  rafId = requestAnimationFrame(tick);
}

// ── Actions ───────────────────────────────────────────────
function startRunning() {
  state   = 'running';
  startAt = performance.now();
  startBtn.textContent = 'Pause';
  resetBtn.hidden = false;
  presetsEl.hidden = true;
  overlayEl.classList.remove('visible');
  face.classList.remove('pulse');
  requestWakeLock();
  rafId = requestAnimationFrame(tick);
}

function pauseTimer() {
  remainingMs = Math.max(0, remainingMs - (performance.now() - startAt));
  cancelAnimationFrame(rafId);
  state = 'paused';
  startBtn.textContent = 'Resume';
  releaseWakeLock();
}

function resumeTimer() {
  state   = 'running';
  startAt = performance.now();
  startBtn.textContent = 'Pause';
  requestWakeLock();
  rafId = requestAnimationFrame(tick);
}

function resetTimer() {
  cancelAnimationFrame(rafId);
  remainingMs = totalMs;
  state = 'idle';
  render(remainingMs);
  startBtn.textContent = 'Start';
  resetBtn.hidden = true;
  presetsEl.hidden = false;
  overlayEl.classList.remove('visible');
  face.classList.remove('pulse');
  releaseWakeLock();
}

function finish() {
  cancelAnimationFrame(rafId);
  state = 'complete';
  face.classList.remove('pulse');
  setFill(0);
  overlayEl.classList.add('visible');
  startBtn.textContent = 'Again';
  releaseWakeLock();
  playChime();
}

function setDuration(seconds, name) {
  totalMs      = seconds * 1000;
  remainingMs  = totalMs;
  activityName = name;
  labelEl.textContent = name;
  render(remainingMs);
}

// ── Button handlers ───────────────────────────────────────
startBtn.addEventListener('click', () => {
  if (state === 'idle')     startRunning();
  else if (state === 'running') pauseTimer();
  else if (state === 'paused')  resumeTimer();
  else if (state === 'complete') {
    // restart same activity
    remainingMs = totalMs;
    overlayEl.classList.remove('visible');
    face.classList.remove('pulse');
    render(remainingMs);
    state = 'idle';
    startRunning();
  }
});

resetBtn.addEventListener('click', resetTimer);

// ── Presets ───────────────────────────────────────────────
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state === 'running' || state === 'paused') return;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    customInput.value = '';
    setDuration(parseInt(btn.dataset.mins, 10) * 60, btn.dataset.name);
    state = 'idle';
    startBtn.textContent = 'Start';
    resetBtn.hidden = true;
    overlayEl.classList.remove('visible');
    face.classList.remove('pulse');
  });
});

function applyCustom() {
  const val = parseFloat(customInput.value);
  if (!val || val < 0.5 || val > 120) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  setDuration(Math.round(val * 60), 'Custom');
  state = 'idle';
  startBtn.textContent = 'Start';
  resetBtn.hidden = true;
  overlayEl.classList.remove('visible');
  face.classList.remove('pulse');
}
customSet.addEventListener('click', applyCustom);
customInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyCustom(); });

// ── Chime ─────────────────────────────────────────────────
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Ascending major triad C5 → E5 → G5
    [[523.25, 0], [659.25, 0.38], [783.99, 0.76]].forEach(([freq, delay]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.28, t + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
      osc.start(t);
      osc.stop(t + 2.2);
    });
  } catch (_) { /* audio unavailable */ }
}

// ── Wake Lock ─────────────────────────────────────────────
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
// Re-acquire if tab returns to foreground while running
document.addEventListener('visibilitychange', () => {
  if (state === 'running' && document.visibilityState === 'visible') requestWakeLock();
});

// ── Theme ─────────────────────────────────────────────────
const themeBtn = document.getElementById('theme-toggle');
const root     = document.documentElement;
const saved    = localStorage.getItem('aisfp-theme');
if (saved) root.setAttribute('data-theme', saved);
if (saved === 'light') themeBtn.textContent = '○';

themeBtn.addEventListener('click', () => {
  const cur    = root.getAttribute('data-theme');
  const isDark = cur === 'dark' || (!cur && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next   = isDark ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('aisfp-theme', next);
  themeBtn.textContent = next === 'dark' ? '☽' : '○';
});

// ── Init ──────────────────────────────────────────────────
render(remainingMs);
</script>

</body>
</html>
