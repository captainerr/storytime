<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storytime</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Storytime">
<meta name="theme-color" content="#1e1005">
<!-- Open Graph / social sharing -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://lullaby.aistuffforparents.com/">
<meta property="og:title" content="Storytime">
<meta property="og:description" content="Gentle bedtime stories, freshly written every night. Tap a button, get a cozy original story with an illustration.">
<meta property="og:image" content="https://lullaby.aistuffforparents.com/social.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Storytime">
<meta name="twitter:description" content="Gentle bedtime stories, freshly written every night.">
<meta name="twitter:image" content="https://lullaby.aistuffforparents.com/social.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<script>
  // Runs before CSS paints so the page never flashes the wrong theme.
  (function () {
    var saved = localStorage.getItem('theme');
    document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
  })();
</script>
<style>
  /* ── CSS variables ─────────────────────────────────── */
  :root {
    color-scheme: dark;
    --bg:           #120d08;
    --fg:           #f0e2c0;
    --muted:        #9a7d55;
    --accent:       #c8922a;
    --button-bg:    #7a3e12;
    --button-fg:    #f5e6c8;
    --toggle-border:#3d2810;
    --panel-bg:     #1c1509;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg:           #f2e5c8;
    --fg:           #2d1a08;
    --muted:        #7a5a32;
    --accent:       #6b3410;
    --button-bg:    #4a2810;
    --button-fg:    #f2e5c8;
    --toggle-border:#c8a870;
    --panel-bg:     #ede0be;
  }

  /* ── Full-viewport background ──────────────────────── */
  html {
    min-height: 100%;
    background: radial-gradient(ellipse at 50% 25%, #1e1208 0%, #120d08 100%);
  }
  html[data-theme="light"] {
    background: radial-gradient(ellipse at 50% 25%, #faf0d8 0%, #f2e5c8 100%);
  }

  /* ── Base ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: 'Lora', Georgia, serif;
    max-width: 680px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
    line-height: 1.7;
    background: transparent;
    color: var(--fg);
  }

  /* ── Fixed corner buttons ───────────────────────────── */
  #theme-toggle, #library-link, #install-btn, #music-btn {
    position: fixed;
    top: 1rem;
    width: 2.75rem;
    height: 2.75rem;
    border-radius: 50%;
    border: 1px solid var(--toggle-border);
    background: var(--panel-bg);
    color: var(--fg);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  #theme-toggle { right: 1rem; }
  #library-link { right: 4.25rem; }
  #music-btn    { right: 7.5rem; }
  #install-btn  { right: 10.75rem; }
  #music-btn.playing { color: var(--accent); border-color: var(--accent); }

  /* ── iOS install nudge ──────────────────────────────── */
  #install-nudge {
    position: fixed;
    top: 4.4rem;
    right: 0.75rem;
    background: var(--panel-bg);
    border: 1px solid var(--toggle-border);
    border-radius: 14px;
    padding: 0.9rem 1.1rem;
    max-width: 255px;
    font-family: 'Lora', serif;
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--fg);
    z-index: 200;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  }
  #install-nudge::before {
    content: '';
    position: absolute;
    top: -7px;
    right: 2.5rem;
    width: 12px;
    height: 12px;
    background: var(--panel-bg);
    border-top: 1px solid var(--toggle-border);
    border-left: 1px solid var(--toggle-border);
    transform: rotate(45deg);
  }
  #install-nudge .nudge-share {
    display: inline-block;
    font-size: 1em;
    vertical-align: middle;
  }

  /* ── Title ─────────────────────────────────────────── */
  h1 {
    font-family: 'Lora', serif;
    font-size: 2rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 0.4rem;
    letter-spacing: 0.04em;
  }
  .title-ornament {
    text-align: center;
    color: var(--accent);
    font-size: 1rem;
    letter-spacing: 0.5em;
    margin-bottom: 2rem;
    user-select: none;
  }

  /* ── Controls ──────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 1rem;
  }
  button#generate {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 1.05rem;
    padding: 0.7rem 1.9rem;
    border-radius: 999px;
    border: none;
    background: var(--button-bg);
    color: var(--button-fg);
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: filter 0.15s;
  }
  :root:not([data-theme="light"]) button#generate {
    box-shadow: 0 0 16px 3px rgba(200, 146, 42, 0.15);
  }
  button#generate:hover { filter: brightness(1.14); }
  button#generate:disabled {
    opacity: 0.5;
    cursor: default;
    filter: none;
    box-shadow: none;
  }
  .silly-meter-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }
  #silly-meter-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  #silly-meter {
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    writing-mode: vertical-lr;
    direction: rtl;
    width: 1.5rem;
    height: 6rem;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* ── Advanced link ─────────────────────────────────── */
  .adv-link-wrap {
    text-align: center;
    margin-bottom: 2rem;
  }
  #adv-open {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  #adv-open:hover { color: var(--fg); }
  .adv-badge {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Status ────────────────────────────────────────── */
  #status {
    text-align: center;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--muted);
    min-height: 1.6em;
    margin-bottom: 1.5rem;
    transition: opacity 0.4s ease;
  }
  #status.loading-fade {
    animation: loadingFade 2.8s ease-in-out infinite;
  }
  @keyframes loadingFade {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── Story title ───────────────────────────────────── */
  #story-title {
    font-family: 'EB Garamond', serif;
    font-size: 1.9rem;
    font-style: italic;
    text-align: center;
    color: var(--fg);
    margin-bottom: 1.5rem;
    line-height: 1.3;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #story-title.visible {
    opacity: 1;
  }

  /* ── Read aloud ────────────────────────────────────── */
  #audio-controls {
    text-align: center;
    margin-bottom: 1.6rem;
  }
  .read-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.45em;
    padding: 0.4rem 1.1rem;
    border-radius: 99px;
    border: 1px solid var(--toggle-border);
    background: transparent;
    color: var(--muted);
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .read-btn:hover { color: var(--fg); border-color: var(--muted); }
  .read-btn.playing { color: var(--accent); border-color: var(--accent); }

  /* ── Story ─────────────────────────────────────────── */
  #story {
    font-family: 'EB Garamond', serif;
    font-size: 1.2rem;
    line-height: 1.85;
    letter-spacing: 0.01em;
    white-space: pre-wrap;
  }
  /* Drop cap — JS creates a .drop-cap span for animation control */
  .drop-cap {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 5.2em;
    float: left;
    line-height: 0.72;
    padding-right: 0.06em;
    padding-top: 0.06em;
    color: var(--accent);
    animation: dropCapReveal 1.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes dropCapReveal {
    0%   { opacity: 0; filter: blur(20px) brightness(3);   text-shadow: 0 0 50px var(--accent), 0 0 25px var(--accent); }
    20%  { opacity: 0.7; filter: blur(7px) brightness(1.6); text-shadow: 0 0 20px var(--accent); }
    60%  { opacity: 1; filter: blur(1.5px) brightness(1.1); text-shadow: 0 0 8px var(--accent); }
    100% { opacity: 1; filter: blur(0px) brightness(1);    text-shadow: 0 0 3px rgba(200,146,42,0.15); }
  }
  /* Glowing quill cursor */
  .quill-cursor {
    display: inline-block;
    width: 2px;
    height: 1.05em;
    background: var(--accent);
    vertical-align: text-bottom;
    border-radius: 1px;
    margin-left: 1px;
    box-shadow: 0 0 7px 2px var(--accent);
    animation: quillPulse 0.5s ease-in-out infinite;
  }
  @keyframes quillPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* ── Save prompt ───────────────────────────────────── */
  #save-prompt {
    margin-top: 2.5rem;
    text-align: center;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #save-prompt.visible {
    opacity: 1;
  }
  .save-prompt-text {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--muted);
    margin: 0 0 0.75rem;
  }
  .save-btn {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.6rem 1.6rem;
    border-radius: 999px;
    border: none;
    background: var(--button-bg);
    color: var(--button-fg);
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: filter 0.15s;
    display: block;
    margin: 0 auto 0.75rem;
  }
  .save-btn:hover:not(:disabled) { filter: brightness(1.14); }
  .save-btn:disabled { opacity: 0.6; cursor: default; filter: none; }
  .library-link {
    display: block;
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--muted);
    text-decoration: none;
  }
  .library-link:hover { color: var(--fg); }

  /* ── Illustration ──────────────────────────────────── */
  #illustration {
    display: none;
    max-width: 100%;
    margin-top: 2.5rem;
    border-radius: 3px;
    padding: 0.65rem;
    background: var(--panel-bg);
    border: 1px solid var(--toggle-border);
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--toggle-border);
  }

  /* ── Advanced overlay ──────────────────────────────── */
  .adv-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.62);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .adv-overlay[hidden] { display: none; }

  /* ── Advanced panel ────────────────────────────────── */
  .adv-panel {
    background: var(--panel-bg);
    border: 1px solid var(--toggle-border);
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .adv-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .adv-panel-title {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 1.05rem;
  }
  .adv-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.6rem;
    cursor: pointer;
    line-height: 1;
    padding: 0;
    font-family: inherit;
  }
  .adv-close:hover { color: var(--fg); }
  .adv-field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .adv-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .adv-select {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--toggle-border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    width: 100%;
    cursor: pointer;
  }
  .length-options {
    display: flex;
    gap: 0.5rem;
  }
  .length-btn {
    flex: 1;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--toggle-border);
    border-radius: 6px;
    padding: 0.5rem 0.25rem;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: center;
    line-height: 1.4;
  }
  .length-btn.selected {
    background: var(--button-bg);
    color: var(--button-fg);
    border-color: var(--button-bg);
  }
  .adv-silly-wrap {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  #adv-silly-meter {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }
  #adv-silly-label {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--fg);
    min-width: 4.5rem;
  }
  .adv-panel-footer {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    padding-top: 0.25rem;
    border-top: 1px solid var(--toggle-border);
  }
  #adv-reset {
    background: none;
    border: 1px solid var(--toggle-border);
    color: var(--muted);
    border-radius: 999px;
    padding: 0.5rem 1rem;
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    cursor: pointer;
  }
  #adv-reset:hover { color: var(--fg); }
  #adv-done {
    background: var(--button-bg);
    color: var(--button-fg);
    border: none;
    border-radius: 999px;
    padding: 0.5rem 1.25rem;
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
  }

  /* ── Build version stamp (temporary, for deploy testing) ────── */
  #build-version {
    text-align: center;
    font-family: system-ui, sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.02em;
    color: var(--muted);
    opacity: 0.55;
    padding: 1rem 0 0.25rem;
  }
</style>
</head>
<body>
  <button id="theme-toggle" aria-label="Toggle light/dark theme"></button>
  <a id="library-link" href="/library" aria-label="Browse the library">📚</a>
  <button id="music-btn" aria-label="Play a lullaby" aria-pressed="false">🎵</button>
  <button id="install-btn" aria-label="Install app" hidden>
    <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="4.5" y="2" width="11" height="16" rx="2"/>
      <circle cx="10" cy="15.5" r="0.8" fill="currentColor" stroke="none"/>
      <path d="M10 6v5M7.5 8.5 10 6l2.5 2.5"/>
    </svg>
  </button>
  <div id="install-nudge" hidden role="tooltip">
    Tap the <span class="nudge-share">⬆</span> <strong>Share</strong> button in Safari's toolbar, then choose <strong>"Add to Home Screen"</strong>
  </div>
  <h1>🌙 Storytime</h1>
  <div class="title-ornament">❧ &nbsp; ❧ &nbsp; ❧</div>
  <div class="controls">
    <button id="generate">Tell me a story</button>
    <div class="silly-meter-wrap">
      <input type="range" id="silly-meter" min="0" max="4" step="1" value="0" aria-label="Silliness level">
      <span id="silly-meter-label">Calm</span>
    </div>
  </div>
  <div class="adv-link-wrap">
    <button id="adv-open" aria-haspopup="dialog">⚙ Customize story <span id="adv-badge" class="adv-badge" hidden aria-hidden="true"></span></button>
  </div>

  <!-- Advanced settings panel -->
  <div id="adv-overlay" class="adv-overlay" hidden>
    <div class="adv-panel" role="dialog" aria-modal="true" aria-label="Customize story">
      <div class="adv-panel-header">
        <span class="adv-panel-title">Customize story</span>
        <button id="adv-close" class="adv-close" aria-label="Close">×</button>
      </div>

      <div class="adv-field">
        <label class="adv-label" for="adv-character">Character</label>
        <select id="adv-character" class="adv-select">
          <option value="">Random (surprise me)</option>
        </select>
      </div>

      <div class="adv-field">
        <label class="adv-label" for="adv-theme">Setting</label>
        <select id="adv-theme" class="adv-select">
          <option value="">Random (surprise me)</option>
        </select>
      </div>

      <div class="adv-field">
        <label class="adv-label" for="adv-moral">Moral of the story</label>
        <select id="adv-moral" class="adv-select">
          <option value="">None (let the story decide)</option>
          <option value="kindness">Kindness</option>
          <option value="courage">Courage</option>
          <option value="friendship">Friendship</option>
          <option value="patience">Patience</option>
          <option value="sharing">Sharing</option>
          <option value="honesty">Honesty</option>
          <option value="perseverance">Perseverance</option>
          <option value="gratitude">Gratitude</option>
        </select>
      </div>

      <div class="adv-field">
        <span class="adv-label">Story length</span>
        <div class="length-options">
          <button class="length-btn" data-length="0">Short<br><small>~2 min</small></button>
          <button class="length-btn selected" data-length="1">Medium<br><small>~4 min</small></button>
          <button class="length-btn" data-length="2">Long<br><small>~6 min</small></button>
        </div>
      </div>

      <div class="adv-field">
        <label class="adv-label" for="adv-silly-meter">Silliness</label>
        <div class="adv-silly-wrap">
          <input type="range" id="adv-silly-meter" min="0" max="4" step="1" value="0">
          <span id="adv-silly-label">Calm</span>
        </div>
      </div>

      <div class="adv-panel-footer">
        <button id="adv-reset">Reset to defaults</button>
        <button id="adv-done">Done</button>
      </div>
    </div>
  </div>

  <div id="status"></div>
  <div id="story-title"></div>
  <div id="audio-controls" hidden>
    <button id="read-btn" class="read-btn" aria-label="Read story aloud">
      <svg id="read-icon" viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>
      <span id="read-label">Read aloud</span>
    </button>
  </div>
  <div id="story"></div>
  <img id="illustration" alt="Illustration for tonight's story">
  <div id="save-prompt" hidden>
    <p class="save-prompt-text">Love this story?</p>
    <button id="save-btn" class="save-btn">Add it to our library</button>
    <a href="/library" class="library-link">Browse the library →</a>
  </div>

  <script>
    // ── Theme toggle ──────────────────────────────────────────────
    const themeToggle = document.getElementById('theme-toggle');

    function currentTheme() {
      return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
    }

    function renderToggleIcon() {
      themeToggle.textContent = currentTheme() === 'light' ? '☀️' : '🌙';
    }

    themeToggle.addEventListener('click', () => {
      const next = currentTheme() === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      renderToggleIcon();
    });

    renderToggleIcon();

    // ── Data ──────────────────────────────────────────────────────
    const CHARACTERS_LIST = [
      'a small fox', 'a curious rabbit', 'a young owl', 'a gentle bear cub',
      'a little mouse', 'a sleepy hedgehog', 'a tiny turtle', 'a baby otter',
      'a shy deer', 'a small dragon', 'a kind badger', 'a wandering duckling',
    ];

    const THEMES_LIST = [
      'a quiet forest', 'a cozy cottage', 'a starry meadow', 'a gentle river',
      'a snug treehouse', 'a small fishing village', 'a mountain cabin',
      'a lantern-lit garden', 'a sleepy harbor town', 'a field of fireflies',
      'a warm library', 'a soft snowy village', 'an island with tide pools',
      'a windmill by a lake', 'a greenhouse full of night-blooming flowers',
    ];

    const SILLY_LABELS = ['Calm', 'Sweet', 'Playful', 'Goofy', 'Wacky'];

    // ── Advanced settings state ───────────────────────────────────
    const ADV_KEY = 'storytime-advanced';
    const ADV_DEFAULTS = { character: null, theme: null, moral: null, length: 1, silliness: 0 };
    let adv = { ...ADV_DEFAULTS };

    function loadAdv() {
      try {
        const saved = JSON.parse(localStorage.getItem(ADV_KEY));
        if (saved && typeof saved === 'object') adv = { ...ADV_DEFAULTS, ...saved };
      } catch {}
    }

    function saveAdv() {
      localStorage.setItem(ADV_KEY, JSON.stringify(adv));
    }

    function isAdvDefault() {
      return !adv.character && !adv.theme && !adv.moral && adv.length === 1;
    }

    // ── DOM refs ──────────────────────────────────────────────────
    const button          = document.getElementById('generate');
    const status          = document.getElementById('status');
    const storyTitle      = document.getElementById('story-title');
    const audioControls   = document.getElementById('audio-controls');
    const readBtn         = document.getElementById('read-btn');
    const readIcon        = document.getElementById('read-icon');
    const readLabel       = document.getElementById('read-label');
    const story           = document.getElementById('story');
    const illustration    = document.getElementById('illustration');
    const savePrompt      = document.getElementById('save-prompt');
    const saveBtn         = document.getElementById('save-btn');
    const sillyMeter      = document.getElementById('silly-meter');
    const sillyMeterLabel = document.getElementById('silly-meter-label');
    const advOpen         = document.getElementById('adv-open');
    const advOverlay      = document.getElementById('adv-overlay');
    const advClose        = document.getElementById('adv-close');
    const advDone         = document.getElementById('adv-done');
    const advReset        = document.getElementById('adv-reset');
    const advBadge        = document.getElementById('adv-badge');
    const advCharacter    = document.getElementById('adv-character');
    const advTheme        = document.getElementById('adv-theme');
    const advMoral        = document.getElementById('adv-moral');
    const advSillyMeter   = document.getElementById('adv-silly-meter');
    const advSillyLabel   = document.getElementById('adv-silly-label');
    const lengthBtns      = Array.from(document.querySelectorAll('.length-btn'));

    // ── Populate dropdowns ────────────────────────────────────────
    CHARACTERS_LIST.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      let label = c.replace(/^an? /, '');
      opt.textContent = label.charAt(0).toUpperCase() + label.slice(1);
      advCharacter.appendChild(opt);
    });

    THEMES_LIST.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      let label = t.replace(/^an? /, '');
      opt.textContent = label.charAt(0).toUpperCase() + label.slice(1);
      advTheme.appendChild(opt);
    });

    // ── Badge ─────────────────────────────────────────────────────
    function updateBadge() {
      advBadge.hidden = isAdvDefault();
    }

    // ── Silliness sync ────────────────────────────────────────────
    function syncSilliness(value) {
      adv.silliness = value;
      sillyMeter.value = value;
      advSillyMeter.value = value;
      sillyMeterLabel.textContent = SILLY_LABELS[value];
      advSillyLabel.textContent = SILLY_LABELS[value];
    }

    sillyMeter.addEventListener('input', () => syncSilliness(Number(sillyMeter.value)));
    advSillyMeter.addEventListener('input', () => syncSilliness(Number(advSillyMeter.value)));

    // ── Length segmented control ──────────────────────────────────
    function setLength(index) {
      adv.length = index;
      lengthBtns.forEach(btn => {
        btn.classList.toggle('selected', Number(btn.dataset.length) === index);
      });
    }

    lengthBtns.forEach(btn => {
      btn.addEventListener('click', () => setLength(Number(btn.dataset.length)));
    });

    // ── Apply adv state to panel controls ─────────────────────────
    function applyAdvToPanel() {
      advCharacter.value = adv.character || '';
      advTheme.value     = adv.theme || '';
      advMoral.value     = adv.moral || '';
      setLength(adv.length);
      syncSilliness(adv.silliness);
    }

    // ── Collect panel controls into adv state ─────────────────────
    function collectAdvFromPanel() {
      adv.character = advCharacter.value || null;
      adv.theme     = advTheme.value || null;
      adv.moral     = advMoral.value || null;
      // length and silliness are kept in sync in real-time
    }

    // ── Panel open / close ────────────────────────────────────────
    function openPanel() {
      applyAdvToPanel();
      advOverlay.hidden = false;
      advClose.focus();
    }

    function closePanel() {
      collectAdvFromPanel();
      saveAdv();
      updateBadge();
      advOverlay.hidden = true;
    }

    advOpen.addEventListener('click', openPanel);
    advClose.addEventListener('click', closePanel);
    advDone.addEventListener('click', () => { closePanel(); generateStory(); });

    advOverlay.addEventListener('click', e => {
      if (e.target === advOverlay) closePanel();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !advOverlay.hidden) closePanel();
    });

    // ── Reset ─────────────────────────────────────────────────────
    advReset.addEventListener('click', () => {
      adv = { ...ADV_DEFAULTS };
      applyAdvToPanel();
      saveAdv();
      updateBadge();
    });

    // ── Story animation ───────────────────────────────────────────
    let animRunning = false;
    let animCancel  = null;
    let skipCtrl    = null;

    function cancelAnim() {
      if (animCancel) { animCancel(); animCancel = null; }
      if (skipCtrl)   { skipCtrl.abort(); skipCtrl = null; }
      animRunning = false;
    }

    function animateStory(fullText, onComplete) {
      cancelAnim();

      const first = fullText.charAt(0);
      const rest  = fullText.slice(1);

      story.innerHTML = '';

      const cap    = document.createElement('span');
      cap.className   = 'drop-cap';
      cap.textContent = first;

      const body   = document.createElement('span');
      body.className  = 'story-body';

      const cursor = document.createElement('span');
      cursor.className = 'quill-cursor';

      story.append(cap, body, cursor);

      animRunning = true;
      let cancelled = false;
      let i = 0;
      let lastTs = null;

      function finish() {
        body.textContent = rest;
        cursor.remove();
        story.style.cursor = '';
        story.removeAttribute('title');
        animRunning = false;
        animCancel  = null;
        if (skipCtrl) { skipCtrl.abort(); skipCtrl = null; }
        if (onComplete) onComplete();
      }

      animCancel = () => { cancelled = true; finish(); };

      // Tap anywhere on the story to skip
      skipCtrl = new AbortController();
      story.style.cursor = 'pointer';
      story.title = 'Tap to reveal full story';
      story.addEventListener('click', cancelAnim, { signal: skipCtrl.signal });

      // Give the drop cap a head start, then stream the body
      setTimeout(() => {
        if (cancelled) return;
        function tick(ts) {
          if (cancelled) return;
          if (lastTs === null) lastTs = ts;
          const add = Math.max(1, Math.floor((ts - lastTs) * 220 / 1000));
          i = Math.min(i + add, rest.length);
          body.textContent = rest.slice(0, i);
          lastTs = ts;
          if (i < rest.length) requestAnimationFrame(tick);
          else finish();
        }
        requestAnimationFrame(tick);
      }, 550);
    }

    // ── Read aloud ────────────────────────────────────────────────
    const PLAY_ICON  = '<path d="M5 3.5l8 4.5-8 4.5V3.5z"/>';
    const PAUSE_ICON = '<rect x="3" y="2.5" width="3.5" height="11" rx="1"/><rect x="9.5" y="2.5" width="3.5" height="11" rx="1"/>';

    function setReadState(state) {
      if (state === 'playing') {
        readIcon.innerHTML = PAUSE_ICON;
        readLabel.textContent = 'Pause';
        readBtn.classList.add('playing');
      } else if (state === 'paused') {
        readIcon.innerHTML = PLAY_ICON;
        readLabel.textContent = 'Resume';
        readBtn.classList.remove('playing');
      } else {
        readIcon.innerHTML = PLAY_ICON;
        readLabel.textContent = 'Read aloud';
        readBtn.classList.remove('playing');
      }
    }

    function stopReading() {
      speechSynthesis.cancel();
      setReadState('idle');
    }

    function getBritishVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find(v => v.name === 'Daniel')                          // iOS British male
          || voices.find(v => v.name.toLowerCase().includes('british'))
          || voices.find(v => v.lang === 'en-GB' && /male|man/i.test(v.name))
          || voices.find(v => v.lang === 'en-GB')
          || voices.find(v => v.lang.startsWith('en'))
          || null;
    }

    readBtn.addEventListener('click', () => {
      if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        setReadState('paused');
        return;
      }
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        setReadState('playing');
        return;
      }
      if (!currentStoryData?.story) return;
      const utt = new SpeechSynthesisUtterance(currentStoryData.story);
      // Voices may load async on first call — re-query at speak time
      utt.voice = getBritishVoice();
      utt.lang  = 'en-GB';
      utt.rate  = 0.88;
      utt.pitch = 0.9;
      utt.onend   = () => setReadState('idle');
      utt.onerror = () => setReadState('idle');
      speechSynthesis.speak(utt);
      setReadState('playing');
    });

    // Voices load asynchronously in some browsers
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => {};
    }

    // ── Music-box lullaby ─────────────────────────────────────────
    // A gentle, looping music-box tune synthesized with the Web Audio
    // API (bell-like plucked notes) — no audio files, works offline.
    (function () {
      const musicBtn = document.getElementById('music-btn');
      if (!musicBtn) return;

      // Note frequencies (equal temperament)
      const N = {
        C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00,
        A4: 440.00, B4: 493.88, C5: 523.25, D5: 587.33, E5: 659.25,
      };

      // Melodies as [frequency, beats] pairs (null frequency = a rest)
      const TWINKLE = [
        [N.C4,1],[N.C4,1],[N.G4,1],[N.G4,1],[N.A4,1],[N.A4,1],[N.G4,2],
        [N.F4,1],[N.F4,1],[N.E4,1],[N.E4,1],[N.D4,1],[N.D4,1],[N.C4,2],
        [N.G4,1],[N.G4,1],[N.F4,1],[N.F4,1],[N.E4,1],[N.E4,1],[N.D4,2],
        [N.G4,1],[N.G4,1],[N.F4,1],[N.F4,1],[N.E4,1],[N.E4,1],[N.D4,2],
        [N.C4,1],[N.C4,1],[N.G4,1],[N.G4,1],[N.A4,1],[N.A4,1],[N.G4,2],
        [N.F4,1],[N.F4,1],[N.E4,1],[N.E4,1],[N.D4,1],[N.D4,1],[N.C4,2],
        [null,2],
      ];

      const BRAHMS = [
        [N.E4,1],[N.E4,1],[N.G4,2],
        [N.E4,1],[N.E4,1],[N.G4,2],
        [N.E4,1],[N.G4,1],[N.C5,1],[N.B4,1],[N.A4,1],[N.G4,2],
        [N.A4,1],[N.A4,1],[N.D5,1],[N.C5,1],[N.B4,1],[N.A4,1],
        [N.G4,1],[N.F4,1],[N.E4,1],[N.D4,1],[N.C4,3],
        [null,2],
      ];

      const BEAT = 0.6; // seconds per beat — a slow, gentle lullaby tempo

      // Music-box tine timbre: pure sine partials at slightly inharmonic
      // ratios. Higher partials are quieter and decay faster, giving the
      // bright "ping" that settles into a soft hum — instead of a flat beep.
      const PARTIALS = [
        { ratio: 1.0,  amp: 1.0,  decay: 2.4 },
        { ratio: 2.0,  amp: 0.5,  decay: 1.6 },
        { ratio: 3.01, amp: 0.35, decay: 1.1 },
        { ratio: 4.16, amp: 0.2,  decay: 0.7 },
        { ratio: 5.43, amp: 0.12, decay: 0.45 },
      ];
      const BASE = 0.14; // per-note level, kept low; the limiter guards peaks

      let ctx = null, masterBus = null, dryGain = null, wetGain = null,
          limiter = null, convolver = null;
      let musicOn = false, loopTimeout = null, liveNodes = [];

      // A short synthetic impulse response (exponentially-decaying noise) for
      // a gentle room reverb — adds warmth with no audio file.
      function makeImpulse(seconds, decay) {
        const rate = ctx.sampleRate;
        const len = Math.floor(rate * seconds);
        const buf = ctx.createBuffer(2, len, rate);
        for (let ch = 0; ch < 2; ch++) {
          const data = buf.getChannelData(ch);
          for (let i = 0; i < len; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
          }
        }
        return buf;
      }

      // Build the audio graph once: notes -> (dry + reverb) -> master -> limiter.
      // The limiter is a brick wall, so overlapping notes can never clip.
      function buildGraph() {
        const AC = window.AudioContext || window.webkitAudioContext;
        ctx = new AC();
        limiter = ctx.createDynamicsCompressor();
        limiter.threshold.value = -10;
        limiter.knee.value = 0;
        limiter.ratio.value = 20;
        limiter.attack.value = 0.003;
        limiter.release.value = 0.25;
        limiter.connect(ctx.destination);
        masterBus = ctx.createGain();
        masterBus.gain.value = 0.32;
        masterBus.connect(limiter);
        dryGain = ctx.createGain();
        dryGain.gain.value = 0.9;
        dryGain.connect(masterBus);
        convolver = ctx.createConvolver();
        convolver.buffer = makeImpulse(2.4, 3);
        wetGain = ctx.createGain();
        wetGain.gain.value = 0.22;
        convolver.connect(wetGain);
        wetGain.connect(masterBus);
      }

      // One music-box note: a sum of decaying sine partials, fed to dry + reverb.
      function pluck(freq, startTime) {
        if (!freq) return;
        for (const p of PARTIALS) {
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = freq * p.ratio;

          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0, startTime);
          gain.gain.linearRampToValueAtTime(BASE * p.amp, startTime + 0.004);
          gain.gain.exponentialRampToValueAtTime(0.0001, startTime + p.decay);

          osc.connect(gain);
          gain.connect(dryGain);
          gain.connect(convolver);

          const stopAt = startTime + p.decay + 0.1;
          osc.start(startTime);
          osc.stop(stopAt);
          liveNodes.push(osc, gain);
        }
      }

      // Schedule one pass of the melody, then queue the next pass if still on
      function scheduleLoop(melody) {
        liveNodes = [];
        let t = ctx.currentTime + 0.06;
        let totalBeats = 0;
        for (const [freq, beats] of melody) {
          pluck(freq, t);
          t += beats * BEAT;
          totalBeats += beats;
        }
        loopTimeout = setTimeout(() => {
          if (musicOn) scheduleLoop(melody);
        }, totalBeats * BEAT * 1000);
      }

      function start() {
        if (!ctx) buildGraph();
        if (ctx.state === 'suspended') ctx.resume();
        masterBus.gain.cancelScheduledValues(ctx.currentTime);
        masterBus.gain.setValueAtTime(0.32, ctx.currentTime);
        musicOn = true;
        musicBtn.classList.add('playing');
        musicBtn.setAttribute('aria-pressed', 'true');
        scheduleLoop(Math.random() < 0.5 ? BRAHMS : TWINKLE);
      }

      function stop() {
        musicOn = false;
        clearTimeout(loopTimeout);
        loopTimeout = null;
        if (masterBus) {
          const now = ctx.currentTime;
          masterBus.gain.cancelScheduledValues(now);
          masterBus.gain.setValueAtTime(masterBus.gain.value, now);
          masterBus.gain.linearRampToValueAtTime(0.0001, now + 0.08);
        }
        liveNodes.forEach(node => {
          try { if (node.stop) node.stop(); } catch {}
          try { node.disconnect(); } catch {}
        });
        liveNodes = [];
        musicBtn.classList.remove('playing');
        musicBtn.setAttribute('aria-pressed', 'false');
      }

      musicBtn.addEventListener('click', () => { musicOn ? stop() : start(); });
    })();

    // ── Save to library ───────────────────────────────────────────
    let currentStoryData = null;

    function showSavePrompt() {
      savePrompt.hidden = false;
      // Trigger fade-in on next frame
      requestAnimationFrame(() => savePrompt.classList.add('visible'));
    }

    saveBtn.addEventListener('click', async () => {
      if (!currentStoryData) return;
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/save-story', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentStoryData),
        });
        if (!res.ok) {
          const msg = await res.text();
          throw new Error(msg || `Status ${res.status}`);
        }
        saveBtn.textContent = 'Added to the library ✓';
      } catch (err) {
        saveBtn.disabled = false;
        saveBtn.textContent = `Save failed: ${err.message}`;
      }
    });

    // ── Loading messages ──────────────────────────────────────────
    const LOADING_MSGS = [
      'Lighting the candle…',
      'Sharpening the quill…',
      'Choosing just the right words…',
      'Setting the scene…',
      'Weaving in a little magic…',
      'Tucking in the characters…',
      'Stirring up a gentle adventure…',
      'Sprinkling in some wonder…',
      'Warming up the hearth…',
      'Letting the story breathe…',
    ];
    let loadingTimer = null;

    function startLoadingAnim() {
      let i = 0;
      function show() {
        status.classList.remove('loading-fade');
        void status.offsetWidth; // reflow to restart animation
        status.textContent = LOADING_MSGS[i % LOADING_MSGS.length];
        status.classList.add('loading-fade');
        i++;
      }
      show();
      loadingTimer = setInterval(show, 2800);
    }

    function stopLoadingAnim() {
      clearInterval(loadingTimer);
      loadingTimer = null;
      status.classList.remove('loading-fade');
    }

    // ── Story generation ──────────────────────────────────────────
    async function generateStory() {
      cancelAnim();
      stopReading();
      button.disabled = true;
      storyTitle.textContent = '';
      storyTitle.classList.remove('visible');
      audioControls.hidden = true;
      setReadState('idle');
      story.innerHTML = '';
      illustration.removeAttribute('src');
      illustration.style.display = 'none';
      currentStoryData = null;
      savePrompt.hidden = true;
      savePrompt.classList.remove('visible');
      saveBtn.disabled = false;
      saveBtn.textContent = 'Add it to our library';
      startLoadingAnim();

      try {
        const response = await fetch('/api/generate-story', {
          method: 'POST',
          cache: 'no-store',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            silliness: adv.silliness,
            character: adv.character || null,
            theme: adv.theme || null,
            moral: adv.moral || null,
            length: adv.length,
          }),
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || `Request failed with status ${response.status}`);
        }

        const data = await response.json();
        storyTitle.textContent = data.title || '';
        setTimeout(() => storyTitle.classList.add('visible'), 80);
        currentStoryData = {
          title: data.title || '',
          story: data.story,
          silliness: adv.silliness,
          character: adv.character || null,
          theme: adv.theme || null,
          moral: adv.moral || null,
          length: adv.length,
        };
        stopLoadingAnim();
        audioControls.hidden = false;
        animateStory(data.story, showSavePrompt);
        status.textContent = '';

        if (data.image) {
          illustration.src = data.image;
          illustration.style.display = 'block';
        } else if (data.imageError) {
          status.textContent = `Illustration unavailable: ${data.imageError}`;
        }
      } catch (err) {
        stopLoadingAnim();
        status.textContent = `Something went wrong: ${err.message}`;
      } finally {
        button.disabled = false;
      }
    }

    button.addEventListener('click', generateStory);

    // ── Init ──────────────────────────────────────────────────────
    loadAdv();
    syncSilliness(adv.silliness);
    updateBadge();
    generateStory();

    // ── PWA ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    const installBtn  = document.getElementById('install-btn');
    const installNudge = document.getElementById('install-nudge');

    // Don't show anything if already running as installed app
    const isStandalone = window.navigator.standalone === true
      || window.matchMedia('(display-mode: standalone)').matches;

    if (!isStandalone) {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

      if (isIOS) {
        // iOS has no programmatic install API — show a nudge tooltip instead
        installBtn.hidden = false;
        installBtn.addEventListener('click', e => {
          e.stopPropagation();
          installNudge.hidden = !installNudge.hidden;
        });
        document.addEventListener('click', () => { installNudge.hidden = true; });
      } else {
        // Chrome / Android — intercept the native install prompt
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
          e.preventDefault();
          deferredPrompt = e;
          installBtn.hidden = false;
        });
        installBtn.addEventListener('click', async () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') installBtn.hidden = true;
          deferredPrompt = null;
        });
        window.addEventListener('appinstalled', () => { installBtn.hidden = true; });
      }
    }
  </script>
  <div id="build-version" aria-hidden="true"></div>
</body>
</html>
